<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        /* Estilos para el modal de edición de ventas */
        .product-list {
            list-style: none; padding-left: 0; margin-bottom: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .product-list-item {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            border: 2px solid #e9ecef;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }
        .product-list-item:hover {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-color: #0d6efd;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.2);
        }
        .product-list-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #0d6efd, #0b5ed7);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .product-list-item:hover::before {
            opacity: 1;
        }
        .product-list-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 2px solid white;
        }
        .product-list-item .product-info { flex-grow: 1; }
        .product-list-item .product-name { font-weight: 600; margin-bottom: 0.35rem; color: #212529; font-size: 0.95rem; line-height: 1.3; }
        .product-list-item .product-stock { font-size: 0.8rem; color: #6c757d; font-weight: 500; margin-bottom: 0.5rem; }
        .product-list-item .product-action { display: flex; flex-direction: column; gap: 0.5rem; margin-top: auto; }
        .product-list-item .product-price { font-weight: 700; color: #0d6efd; font-size: 1.1rem; text-shadow: 0 1px 2px rgba(13, 110, 253, 0.1); text-align: center; }
        .product-list-item .add-to-cart-btn {
            width: 100%;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
            border: 2px solid #0d6efd;
            box-shadow: 0 2px 8px rgba(13, 110, 253, 0.25);
        }
        .product-list-item .add-to-cart-btn:hover {
            background: linear-gradient(135deg, #0b5ed7 0%, #0a58ca 100%);
            transform: scale(1.03);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.4);
        }
        .product-list-item .add-to-cart-btn:active {
            transform: scale(0.98);
        }
        .category-header {
            background-color: #6c757d; color: white; padding: 0.875rem 1rem; margin-bottom: 0.5rem; border-radius: 0.5rem; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; font-weight: 600; border: none;
        }
        .category-header:hover { background-color: #5a6268; transform: translateY(-1px); }
        .category-header .bi { transition: transform 0.3s; }
        .category-header[aria-expanded="true"] .bi-chevron-down { transform: rotate(180deg); }
        .category-header[aria-expanded="true"] { background-color: #0d6efd; }
        #product-selection-area { max-height: 500px; overflow-y: auto; padding-right: 5px; }
        .low-stock-warning {
            background-color: #fff3cd;
            border-color: #ffc107;
        }
        .card {
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div th:replace="~{topbar :: topbar(activeUri='/ventas')}"></div>

<div class="container-fluid" style="padding-top: 2rem;">

        <div class="container-fluid p-4">
            <div class="card shadow-sm rounded-lg">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="card-title h5 fw-bold mb-0">Lista de Ventas</h2>
                        <a th:href="@{/ventas/nueva}" class="btn btn-primary">Nueva Venta</a>
                    </div>

                    <div class="row g-2 mb-3">
                        <div class="col-md-3">
                            <label for="fechaDesde" class="form-label">Desde</label>
                            <input type="date" id="fechaDesde" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label for="fechaHasta" class="form-label">Hasta</label>
                            <input type="date" id="fechaHasta" class="form-control">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button id="btnFiltrar" class="btn btn-secondary me-2">Filtrar</button>
                            <button id="btnLimpiar" class="btn btn-outline-secondary">Limpiar</button>
                        </div>
                    </div>

                    <table id="tablaVentas" class="table table-hover responsive" style="width:100%">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>N° Venta</th>
                            <th>Cliente</th>
                            <th>Fecha</th>
                            <th>Método de Pago</th>
                            <th>Tipo de Comprobante</th>
                            <th>Descuento</th>
                            <th>Total</th>
                            <th>Nota</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal para Imprimir Boleta/Factura -->
<div class="modal fade" id="boletaModal" tabindex="-1" aria-labelledby="boletaModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="boletaModalLabel">Imprimir Boleta/Factura</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <iframe id="boletaIframe" style="width: 100%; height: 500px; border: none;"></iframe>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary" id="btnPrintBoleta">Imprimir</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal para Editar Venta -->
<div class="modal fade" id="editVentaModal" tabindex="-1" aria-labelledby="editVentaModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editVentaModalLabel">Modificar Venta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="max-height: 80vh; overflow-y: auto;">
                <!-- El contenido se cargará aquí mediante AJAX -->
            </div>
        </div>
    </div>
</div>

<div id="notification-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

<!-- Fragmento de scripts comunes -->
<div th:replace="~{fragments/scripts :: common-scripts}"></div>

<!-- Scripts específicos de la página de ventas -->
<script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>
<script th:src="@{/js/ventas.js}"></script>

</body>
</html>
