<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas de Crédito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .badge-nc-anulacion { background: #dc3545; color: #fff; }
        .badge-nc-devolucion { background: #fd7e14; color: #fff; }
        .badge-nc-descuento { background: #0d6efd; color: #fff; }
        .badge-nc-otros { background: #6c757d; color: #fff; }
    </style>
</head>
<body>

<div th:replace="~{topbar :: topbar(activeUri='/notas-credito')}"></div>

<div class="container-fluid" style="padding-top: 2rem;">
    <div class="container-fluid p-4">
        <div class="card shadow-sm rounded-lg">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="card-title h5 fw-bold mb-0">Notas de Crédito</h2>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-md-3">
                        <label for="fechaDesde" class="form-label">Desde</label>
                        <input type="date" id="fechaDesde" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label for="fechaHasta" class="form-label">Hasta</label>
                        <input type="date" id="fechaHasta" class="form-control">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button id="btnFiltrar" class="btn btn-secondary me-2">Filtrar</button>
                        <button id="btnLimpiar" class="btn btn-outline-secondary">Limpiar</button>
                    </div>
                </div>

                <table id="tablaNotasCredito" class="table table-hover responsive" style="width:100%">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Serie-Correlativo</th>
                        <th>Tipo Nota</th>
                        <th>Venta Origen</th>
                        <th>Cliente</th>
                        <th>Comprobante Origen</th>
                        <th>Motivo</th>
                        <th>Total Acreditado</th>
                        <th>Estado SUNAT</th>
                        <th>Emisión</th>
                        <th>Emitido por</th>
                        <th>Comprobante</th>
                    </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal para ver detalle de NC -->
<div class="modal fade" id="ncDetailModal" tabindex="-1" aria-labelledby="ncDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ncDetailModalLabel">Detalle de Nota de Crédito</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="ncDetailBody">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/notificaciones :: notification-container}"></div>
<div th:replace="~{fragments/scripts :: common-scripts}"></div>

<script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>
<script th:src="@{/js/notas-credito.js}"></script>

</body>
</html>
