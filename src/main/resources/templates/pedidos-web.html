<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .row-en-revision {
            background-color: #fff3cd !important;
        }
        .row-en-revision:hover {
            background-color: #ffe69c !important;
        }
    </style>
</head>
<body>

<div th:replace="~{topbar :: topbar(activeUri='/pedidos_web')}"></div>

<div class="container-fluid" style="padding-top: 2rem;">
    <div class="container-fluid p-4">
        <div class="card shadow-sm rounded-lg">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="card-title h5 fw-bold mb-0">Gestión de Pedidos Web</h2>
                </div>

                <!-- Filtros -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Estado</label>
                        <select class="form-select" id="filtroEstado">
                            <option value="" selected>Todos</option>
                            <option value="PENDIENTE">Pendientes</option>
                            <option value="EN_REVISION">En Revisión</option>
                            <option value="APROBADO">Aprobados</option>
                            <option value="RECHAZADO">Rechazados</option>
                            <option value="PROCESADO">Procesados</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Fecha Desde</label>
                        <input type="date" class="form-control" id="filtroFechaDesde">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Fecha Hasta</label>
                        <input type="date" class="form-control" id="filtroFechaHasta">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Buscar</label>
                        <input type="text" class="form-control" id="filtroBusqueda" placeholder="Nombre o DNI del cliente">
                    </div>
                </div>

                <table id="tablaPedidosWeb" class="table table-hover responsive" style="width:100%">
                    <thead>
                    <tr>
                        <th>N° Pedido</th>
                        <th>Fecha y Hora</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal para Detalle de Pedido Web -->
<div class="modal fade" id="detallePedidoModal" tabindex="-1" aria-labelledby="detallePedidoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detallePedidoModalLabel">Detalle del Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6 class="fw-bold mb-3">Información del Pedido</h6>
                        <table class="table table-sm">
                            <tr><th>N° Pedido:</th><td id="modalNumeroPedido"></td></tr>
                            <tr><th>Fecha:</th><td id="modalFechaPedido"></td></tr>
                            <tr><th>Estado:</th><td><span id="modalEstado" class="badge"></span></td></tr>
                            <tr><th>Total:</th><td id="modalTotal" class="fw-bold"></td></tr>
                        </table>
                        <h6 class="fw-bold mb-3 mt-4">Datos del Cliente</h6>
                        <table class="table table-sm">
                            <tr><th>Nombre:</th><td id="modalNombreCliente"></td></tr>
                            <tr><th>DNI:</th><td id="modalDniCliente"></td></tr>
                            <tr><th>Teléfono:</th><td id="modalTelefonoCliente"></td></tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h6 class="fw-bold mb-3">Productos</h6>
                        <div class="table-responsive">
                            <table class="table table-sm">
                                <thead><tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Subtotal</th></tr></thead>
                                <tbody id="modalProductosBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-md-12">
                        <h6 class="fw-bold mb-3">Comprobante de Pago (Yape)</h6>
                        <div class="text-center">
                            <img id="modalVoucherImagen" src="" alt="Voucher Yape" style="max-width: 100%; max-height: 400px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer;" onclick="abrirImagenFullscreen()">
                            <div><button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="abrirImagenFullscreen()"><i class="bi bi-fullscreen"></i> Ver en pantalla completa</button></div>
                        </div>
                    </div>
                </div>
                <div class="row mt-4" id="modalAcciones">
                    <div class="col-md-12 text-center">
                        <button type="button" class="btn btn-success btn-lg me-2" id="btnAprobarPedido" onclick="aprobarPedido()"><i class="bi bi-check-circle"></i> Aprobar y Procesar Venta</button>
                        <button type="button" class="btn btn-outline-danger btn-lg" id="btnRechazarPedido" onclick="mostrarFormularioRechazo()"><i class="bi bi-x-circle"></i> Rechazar Pedido</button>
                    </div>
                </div>
                <div class="row mt-4" id="formularioRechazo" style="display: none;">
                    <div class="col-md-12">
                        <div class="alert alert-warning">
                            <h6 class="fw-bold">Motivo del Rechazo</h6>
                            <textarea class="form-control" id="motivoRechazo" rows="3" placeholder="Escribe el motivo del rechazo (obligatorio)"></textarea>
                            <div class="mt-2">
                                <button type="button" class="btn btn-danger" onclick="confirmarRechazo()"><i class="bi bi-x-circle"></i> Confirmar Rechazo</button>
                                <button type="button" class="btn btn-secondary" onclick="cancelarRechazo()">Cancelar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal para ver imagen en pantalla completa -->
<div class="modal fade" id="imagenFullscreenModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content bg-transparent border-0">
            <div class="modal-body p-0 text-center">
                <img id="imagenFullscreen" src="" alt="Voucher" style="max-width: 100%; max-height: 90vh;">
            </div>
        </div>
    </div>
</div>

<div id="notification-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

<script>
    alert('pedidos-web.html cargado');
</script>

<div th:replace="~{fragments/scripts :: common-scripts}"></div>

<script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
<script type="text/javascript" src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>
<script th:src="@{/js/pedidos-web.js}"></script>

</body>
</html>
