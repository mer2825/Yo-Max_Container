<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar cierre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .badge-ok { background: #e7ffe7; border: 1px solid #9ee49e; color: #1f6b1f; }
        .badge-danger { background: #ffe8e8; border: 1px solid #ffb3b3; color: #b02a2a; }
        .badge-amber { background: #fff6dc; border: 1px solid #ffe09a; color: #8a5a00; }
        .check-ok { color: #198754; }
        .check-bad { color: #dc3545; }
        .check-ign { color: #6c757d; }
    </style>
</head>
<body>
<div th:replace="~{topbar :: topbar(activeUri='/caja')}"></div>

<div class="container-fluid" style="padding-top: 2rem;">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row mb-3">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <h2 class="mb-0">
                    <i class="bi bi-lock me-2"></i>Confirmación de Cierre de Caja
                </h2>
                <a th:href="@{/caja}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-2"></i>Volver
                </a>
            </div>
            <hr class="mt-2">
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 py-3">
            <h5 class="mb-0">
                <i class="bi bi-calculator me-2"></i>Resumen para confirmación
            </h5>
        </div>

        <div class="card-body">
            <div class="row g-3 text-center">
                <div class="col-md-4">
                    <div class="p-3 rounded border badge-ok fw-semibold">
                        Efectivo esperado
                        <div class="fs-5 mt-1"
                             th:text="${'S/ ' + #numbers.formatDecimal(resumen?.efectivoEsperado != null ? resumen.efectivoEsperado : 0, 1, 'COMMA', 2, 'POINT')}">
                            S/ 0.00
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-3 rounded border">
                        Efectivo declarado
                        <div class="fs-5 mt-1 fw-semibold"
                             th:text="${'S/ ' + #numbers.formatDecimal(montoDeclarado != null ? montoDeclarado : 0, 1, 'COMMA', 2, 'POINT')}">
                            S/ 0.00
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-3 rounded border fw-semibold">
                        Diferencia
                        <div class="fs-5 mt-1"
                             th:with="diff=${diferencia != null ? diferencia : 0}">
                            <span th:text="${'S/ ' + #numbers.formatDecimal(diff, 1, 'COMMA', 2, 'POINT')}"></span>
                        </div>

                        <div class="mt-2">
                            <span class="badge"
                                  th:classappend="${diferencia == null ? 'badge-amber' :
                                                   diferencia.compareTo(BigDecimal.ZERO) < 0 ? ' badge-danger' :
                                                   diferencia.compareTo(BigDecimal.ZERO) == 0 ? ' badge-ok' : ' badge-amber'}"
                                  th:text="${diferencia == null ? 'Pendiente' :
                                                   diferencia.compareTo(BigDecimal.ZERO) < 0 ? 'Negativa' :
                                                   diferencia.compareTo(BigDecimal.ZERO) == 0 ? 'Correcta' : 'Sobrante'}">
                                Diferencia
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="my-4">

            <div class="row">
                <div class="col-12">
                    <h6 class="mb-3">
                        <i class="bi bi-check2-circle me-2"></i>Lista de verificación
                    </h6>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>✅ Total ventas</span>
                            <span class="fw-semibold text-muted"
                                  th:text="${resumen?.totalVentas != null ? #numbers.formatDecimal(resumen.totalVentas, 1, 'COMMA', 2, 'POINT') : '0.00'}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>✅ Sesión iniciada por</span>
                            <span class="fw-semibold"
                                  th:text="${sesion?.usuarioApertura != null ? sesion.usuarioApertura.nombre : 'Sistema'}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>✅ Motivo de diferencia</span>
                            <span class="fw-semibold"
                                  th:text="${motivoDiferencia != null && motivoDiferencia != '' ? motivoDiferencia : '—'}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span>✅ Usuario y hora de cierre</span>
                            <span class="fw-semibold text-muted"
                                  th:text="${usuarioConfirmacionNombre != null ? (usuarioConfirmacionNombre + ' · ' + usuarioConfirmacionHora) : usuarioConfirmacionHora}"></span>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="mt-4 d-grid gap-2 d-md-flex justify-content-md-end">
                <a th:href="@{/caja/cerrar}"
                   class="btn btn-outline-secondary w-100 w-md-auto">
                    <i class="bi bi-pencil-square me-2"></i>← Corregir datos
                </a>

                <form th:action="@{/caja/confirmar-cierre}" method="post" class="w-100 w-md-auto">
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-lock-fill me-2"></i>🔒 Confirmar cierre definitivo
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
