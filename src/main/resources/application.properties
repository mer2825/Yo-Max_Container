# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS FLEXIBLE (LOCAL Y PRODUCCIÓN)
# ===================================================================
# Si DATABASE_URL está presente (en Railway), se usará esa.
# Si no, se usarán las variables locales (para desarrollo).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/acceso}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA E HIBERNATE
# ===================================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=true

# Configuración para aceptar Content-Type con charset
spring.mvc.contentnegotiation.favor-parameter=false
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ===================================================================
# SERIALIZACIÓN JSON - Fechas como strings ISO-8601
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ===================================================================
# OTRAS CONFIGURACIONES DE LA APLICACIÓN
# ===================================================================
# Puerto dinámico para producción, 8080 para local
server.port=${PORT:8080}

# Directorio de subida de archivos (legado, migrando a Cloudinary)
file.upload-dir=${FILE_UPLOAD_DIR:./src/main/resources/static/uploads/}

# Desactivar persistencia de sesión para evitar errores con DevTools
server.servlet.session.persistent=false

# ===================================================================
# CREDENCIALES Y CONFIGURACIÓN DE ENTORNO
# ===================================================================
# Carpeta base en Cloudinary. 'desarrollo' por defecto.
# En producción (Railway), se sobreescribe a 'produccion'.
cloudinary.folder.env=${CLOUDINARY_FOLDER_ENV:produccion}

