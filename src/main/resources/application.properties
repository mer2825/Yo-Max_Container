# ===================================================================
# CONFIGURACIĂ“N DE BASE DE DATOS FLEXIBLE (LOCAL Y PRODUCCIĂ“N)
# ===================================================================
# Si DATABASE_URL estĂ¡ presente (en Railway), se usarĂ¡ esa.
# Si no, se usarĂ¡n las variables locales (para desarrollo).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/acceso}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Flames1902}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACIĂ“N DE JPA E HIBERNATE
# ===================================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=true

# ===================================================================
# OTRAS CONFIGURACIONES DE LA APLICACIĂ“N
# ===================================================================
# Puerto dinĂ¡mico para producciĂ³n, 8080 para local
server.port=${PORT:8080}

# Directorio de subida de archivos (legado, migrando a Cloudinary)
file.upload-dir=${FILE_UPLOAD_DIR:./src/main/resources/static/uploads/}

# Desactivar persistencia de sesiĂ³n para evitar errores con DevTools
server.servlet.session.persistent=false

# ===================================================================
# CREDENCIALES Y CONFIGURACIĂ“N DE ENTORNO
# ===================================================================
# Carpeta base en Cloudinary. 'desarrollo' por defecto.
# En producciĂ³n (Railway), se sobreescribe a 'produccion'.
cloudinary.folder.env=${CLOUDINARY_FOLDER_ENV:desarrollo}

