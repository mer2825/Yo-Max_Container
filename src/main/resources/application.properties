# Configuracion de inicializacion de la base de datos: actualizar sin perder datos
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# Configuracion de la base de datos para PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/acceso}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Asegura que las inicializaciones de datos se ejecuten después de que JPA cree el esquema
spring.jpa.defer-datasource-initialization=true
# No ejecutar data.sql automáticamente para preservar datos existentes
spring.sql.init.mode=never

# Opciones de depuracion
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=true

# Desactiva la persistencia de sesion para evitar errores con DevTools
server.servlet.session.persistent=false

file.upload-dir=${FILE_UPLOAD_DIR:./src/main/resources/static/uploads/}

